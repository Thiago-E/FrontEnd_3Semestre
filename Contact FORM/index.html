<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contatos</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header>
        <div class="container container-flex">
            <img src="./images/mdi_drivers-license-outline.png" alt="imagem de um usuário ilustrativo"
                class="form-header_image-perfil" />
            <h1 class="form-header_contact-form">Contact Form</h1>
            <p class="form-header_text">Insira os dados do contato e clique em cadastrar!</p>
        </div>
    </header>
    <main>
        <div class="container">
            <form class="form-contact" action="">
                <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for="">Nome</label>
                    </div>
                    <div class="form-contact_col-b">
                        <input class="form-contact_input form-contact_input-metade" type="text" id="Nome" name="nome" placeholder="Nome">
                        <input class="form-contact_input form-contact_input-metade" type="text" id="Sobrenome" name="sobrenome" placeholder="Sobrenome">
                    </div>
                </div>
                <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for="">Email</label>
                    </div>
                    <div class="form-contact_col-b">
                        <input class="form-contact_input form-contact_input-inteiro" type="text" id="Email" name="Email" placeholder="ex:fulano@email.com">
                    </div>
                </div>
                
 <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for="">Telefone</label>
                    </div>
                    <div class="form-contact_col-b">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="ddi" name="ddi" placeholder="+55">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="ddd" name="DDD" placeholder="ddd">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="Numero" name="NUMERO" placeholder="ex:93959293">
                    </div>
                </div>
                <div class="form-contact_linha">
                       <div class="form-contact_col-a">
                           <label class="form-contact_label" for="">Endereço</label>
                       </div>
                       <div class="form-contact_col-b">
                           <input class="form-contact_input form-contact_input-quarto" type="text" id="Cep" name="CEP" placeholder="CEP:3925823">
                           <input class="form-contact_input form-contact_input-metade" type="text" id="Rua" name="RUA" placeholder="Rua Lá de Casa">
                           <input class="form-contact_input form-contact_input-quarto" type="text" id="Bloco" name="numerocasa" placeholder="ex:555">
                       </div>
                   </div>
                    <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for=""></label>
                    </div>
                    <div class="form-contact_col-b">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="Bloco" name="Bloco" placeholder="Bloco X">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="Bairro" name="Bairro" placeholder="Bairro">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="Cidade" name="Cidade" placeholder="Cidade">
                    </div>
                </div>
                 <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for=""></label>
                    </div>
                    <div class="form-contact_col-b">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="Estado" name="Estado" placeholder="Estado">
                    </div>
                </div>
                 <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for="">Anotações</label>
                    </div>
                    <div class="form-contact_col-b">
                        <textarea class="form-contact_input form-contact_input-Anotacao" type="text" id="Anotaçoes" name="Anotações" placeholder="Anotações">
                            </textarea>
                    </div>
                </div>
                <div class="botoes">
                    <button class="btn-submit" type="submit">Cadastrar</button>
                    <button class="btn-submit" type="reset">Limpar</button>
                </div>
            </form> 
            </div>
    </main>
 <footer class="form-contact_footer">
        Todos os direitos reservados
    </footer>
    <section class="cadastros">
        <article class="cadastro">

        </article>  
    </section>
    <script src="./js/script.js"></script>
</body>

</html>
